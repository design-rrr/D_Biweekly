name: Biweekly post

on:
  schedule:
    - cron: '0 11 * * 4'
  workflow_dispatch:
    inputs:
      skip-delay:
        description: 'Skip random delay before posting'
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check bi-weekly trigger
        run: |
          PARITY=$(( $(date +%s) / 604800 % 2 ))
          if [ "$PARITY" -eq 0 ]; then
            echo "RUN_BOT=true" >> $GITHUB_ENV
          else
            echo "RUN_BOT=false" >> $GITHUB_ENV
          fi
      - name: Resolve skip-delay flag
        run: echo "SKIP_DELAY=${{ inputs.skip-delay == true && 'true' || '' }}" >> $GITHUB_ENV
      - name: Random delay (0-21 min)
        if: env.RUN_BOT == 'true' && env.SKIP_DELAY != 'true'
        run: sleep $(( RANDOM % 60 ))
      - name: Run bot
        if: env.RUN_BOT == 'true'
        run: node bot.mjs
        env:
          NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
